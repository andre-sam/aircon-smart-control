blueprint:
  name: Aircon Smart Controller (Mitsubishi / ECHONETlite)
  description: >
    Smart climate controller for one or more `climate.*` entities (designed
    around Mitsubishi units exposed via the ECHONETlite integration, but works
    with any climate entity that supports `set_temperature`, `set_hvac_mode`,
    and reports `current_temperature`).


    Features:
      • Maintains a target temperature with configurable hysteresis and a
        minimum runtime to avoid short-cycling.
      • Auto-selects cool / heat mode based on indoor (or optional outdoor)
        temperature vs. target.
      • Time-of-day schedule: only operates between `start_time` and
        `end_time`. Outside the window, units are turned off.
      • Solar-aware: when the optional grid-export sensor indicates surplus
        export above a threshold, the effective target is shifted to
        pre-cool / pre-heat more aggressively (free energy).
      • Master enable toggle (input_boolean).
      • Optional notifications when the controller turns units on/off.


    Designed to apply the SAME logic to every entity in the list. Run the
    automation every minute via the built-in time trigger, plus on relevant
    state changes.


    Tip: to give different rooms different schedules (e.g. bedrooms run
    overnight, living areas warm up from 05:00), instantiate this blueprint
    once per group of rooms. Each instance gets its own entity list,
    schedule, target helper and enable toggle, and they run independently.


    Required helpers (create these first):
      • input_boolean for the master enable toggle
      • input_number for the target temperature (recommended) OR pick a
        fixed value in the blueprint
      • (optional) sensor for outdoor temperature
      • (optional) sensor for grid export power (negative when exporting,
        OR positive with the "positive_when_exporting" toggle)


  domain: automation
  source_url: https://github.com/andre-sam/aircon-smart-control/blob/main/aircon-controller.yaml

  input:
    climate_entities:
      name: Climate entities
      description: One or more `climate.*` entities to control with the same logic.
      selector:
        entity:
          domain: climate
          multiple: true

    enable_toggle:
      name: Master enable toggle
      description: input_boolean to enable/disable the whole automation.
      selector:
        entity:
          domain: input_boolean

    target_temp:
      name: Target temperature (helper)
      description: >
        An `input_number` representing the desired room temperature (°C).
        Recommended over hard-coding a value so you can tweak it from the UI.
      selector:
        entity:
          domain: input_number

    hysteresis:
      name: Hysteresis (°C)
      description: >
        Deadband around the target. Cooling turns ON at
        `target + hysteresis` and OFF at `target - hysteresis`. Heating is
        the mirror image. Keeps the unit from cycling on tiny fluctuations.
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 3.0
          step: 0.1
          unit_of_measurement: "°C"

    min_runtime_minutes:
      name: Minimum runtime (minutes)
      description: >
        Once a unit is turned ON, it will not be turned OFF again for at
        least this many minutes (protects the compressor and reduces wear).
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"

    # ---------------- mode selection ----------------
    mode_strategy:
      name: HVAC mode strategy
      description: >
        How to choose between cool and heat.
          • auto_indoor — pick `cool` if indoor > target, `heat` if indoor < target.
          • auto_outdoor — same, but use the outdoor temperature sensor.
          • auto_season — use `sensor.season` (or custom season sensor) as the
            primary hint: winter→heat, summer→cool, autumn→heat (cool on very
            hot days), spring→cool (heat on very cold nights). Override
            thresholds are configurable below.
          • cool_only — never heat.
          • heat_only — never cool.
          • follow_climate — leave whatever HVAC mode is set on the entity.
      default: auto_indoor
      selector:
        select:
          options:
            - auto_indoor
            - auto_outdoor
            - auto_season
            - cool_only
            - heat_only
            - follow_climate

    season_sensor:
      name: Season sensor (optional)
      description: >
        A sensor whose state is one of `winter`, `spring`, `summer`,
        `autumn`/`fall`. Defaults to the built-in `sensor.season` from the
        Season integration. Used only when `mode_strategy = auto_season`.
      default: sensor.season
      selector:
        entity:
          domain: sensor

    season_hot_override:
      name: Season — hot-day override (°C above target)
      description: >
        In autumn (or spring) when the deciding temperature is at least this
        many °C above the target, switch to cooling instead of heating.
      default: 4.0
      selector:
        number:
          min: 1
          max: 10
          step: 0.5
          unit_of_measurement: "°C"

    season_cold_override:
      name: Season — cold-night override (°C below target)
      description: >
        In spring (or autumn) when the deciding temperature is at least this
        many °C below the target, switch to heating instead of cooling.
      default: 4.0
      selector:
        number:
          min: 1
          max: 10
          step: 0.5
          unit_of_measurement: "°C"

    outdoor_temp_sensor:
      name: Outdoor temperature sensor (optional)
      description: >
        Used by `auto_outdoor`, and (when present) preferred over indoor
        temperature for the season-override comparisons in `auto_season`.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: temperature

    # ---------------- room sensors (optional) ----------------
    room_temp_sensor:
      name: Room temperature sensor (optional)
      description: >
        External temperature sensor (e.g. Netatmo indoor) used INSTEAD of
        the climate entity's own `current_temperature`. Recommended on
        Mitsubishi units whose return-air sensor is biased while running.
        Applies to all entities in this instance.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: temperature

    humidity_sensor:
      name: Indoor humidity sensor (optional)
      description: >
        Indoor relative humidity sensor (e.g. Netatmo). When present and
        humidity is above the threshold while in cool mode, the unit will
        run `dry` instead of `cool`.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: humidity

    humidity_dry_threshold:
      name: Humidity threshold for dry mode (%)
      description: >
        If indoor humidity is at or above this value AND the chosen mode
        is `cool`, switch to `dry` instead. Set 100 to disable.
      default: 65
      selector:
        number:
          min: 30
          max: 100
          step: 1
          unit_of_measurement: "%"

    # ---------------- weather forecast (optional) ----------------
    weather_entity:
      name: Weather entity (optional)
      description: >
        A `weather.*` entity (e.g. Met.no `weather.forecast_home`). When
        configured, today's forecast HIGH/LOW are used to refine
        `auto_season` decisions — so the system can choose cool early in
        the morning before it actually gets hot, etc.
      default: ""
      selector:
        entity:
          domain: weather

    forecast_hot_threshold:
      name: Forecast high — hot day threshold (°C)
      description: >
        If today's forecast HIGH is at or above this value, treat the day
        as "hot" for the autumn/spring season overrides (allowing cool).
      default: 26
      selector:
        number:
          min: 15
          max: 40
          step: 0.5
          unit_of_measurement: "°C"

    forecast_cold_threshold:
      name: Forecast low — cold night threshold (°C)
      description: >
        If today's forecast LOW is at or below this value, treat the night
        as "cold" for the spring/autumn season overrides (allowing heat).
      default: 8
      selector:
        number:
          min: -10
          max: 20
          step: 0.5
          unit_of_measurement: "°C"

    # ---------------- schedule ----------------
    schedule_start:
      name: Schedule — start time
      description: Earliest time of day the controller is allowed to run units.
      default: "06:00:00"
      selector:
        time: {}

    schedule_end:
      name: Schedule — end time
      description: >
        Latest time of day the controller is allowed to run units. Outside
        the window all controlled units are turned OFF.
      default: "23:00:00"
      selector:
        time: {}

    # ---------------- solar awareness ----------------
    solar_export_sensor:
      name: Grid export power sensor (optional)
      description: >
        Sensor reporting power exported to grid. By default expects a SIGNED
        net sensor that goes NEGATIVE when exporting (most common). Use the
        toggle below if your sensor is positive when exporting.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: power

    solar_positive_when_exporting:
      name: Solar sensor is positive when exporting
      description: >
        Enable if your sensor reports a positive value while exporting
        (e.g. an export-only counter). Leave OFF for a signed net sensor
        that goes negative when exporting.
      default: false
      selector:
        boolean: {}

    solar_export_threshold:
      name: Solar export threshold (W)
      description: >
        Minimum surplus export, in watts, before the "solar boost" target
        offset is applied.
      default: 1500
      selector:
        number:
          min: 0
          max: 10000
          step: 100
          unit_of_measurement: "W"

    solar_boost_offset:
      name: Solar boost target offset (°C)
      description: >
        While exporting above the threshold, the effective target is shifted
        by this many °C in the direction of more cooling / heating (i.e.
        cooler target while cooling, warmer target while heating). Set 0 to
        disable solar awareness.
      default: 1.0
      selector:
        number:
          min: 0
          max: 5
          step: 0.5
          unit_of_measurement: "°C"

    # ---------------- notifications ----------------
    notify_service:
      name: Notification service (optional)
      description: >
        Service name to call when units turn on/off, e.g.
        `notify.mobile_app_my_phone`. Leave blank to disable notifications.
      default: ""
      selector:
        text: {}

mode: single
max_exceeded: silent

variables:
  climate_entities: !input climate_entities
  enable_toggle: !input enable_toggle
  target_temp_entity: !input target_temp
  hysteresis: !input hysteresis
  min_runtime_minutes: !input min_runtime_minutes
  mode_strategy: !input mode_strategy
  outdoor_temp_sensor: !input outdoor_temp_sensor
  room_temp_sensor: !input room_temp_sensor
  humidity_sensor: !input humidity_sensor
  humidity_dry_threshold: !input humidity_dry_threshold
  weather_entity: !input weather_entity
  forecast_hot_threshold: !input forecast_hot_threshold
  forecast_cold_threshold: !input forecast_cold_threshold
  season_sensor: !input season_sensor
  season_hot_override: !input season_hot_override
  season_cold_override: !input season_cold_override
  schedule_start: !input schedule_start
  schedule_end: !input schedule_end
  solar_export_sensor: !input solar_export_sensor
  solar_positive_when_exporting: !input solar_positive_when_exporting
  solar_export_threshold: !input solar_export_threshold
  solar_boost_offset: !input solar_boost_offset
  notify_service: !input notify_service

  # ---- derived state (recomputed on every trigger) ----
  enabled: "{{ is_state(enable_toggle, 'on') }}"

  target_base: >
    {{ states(target_temp_entity) | float(default=23) }}

  now_t: "{{ now().strftime('%H:%M:%S') }}"

  in_schedule: >
    {% set s = schedule_start %}
    {% set e = schedule_end %}
    {% set n = now_t %}
    {% if s == e %}
      true
    {% elif s < e %}
      {{ s <= n < e }}
    {% else %}
      {{ n >= s or n < e }}
    {% endif %}

  outdoor_temp: >
    {% if outdoor_temp_sensor not in [none, ''] %}
      {{ states(outdoor_temp_sensor) | float(default=None) }}
    {% else %}
      None
    {% endif %}

  room_humidity: >
    {% if humidity_sensor not in [none, ''] %}
      {{ states(humidity_sensor) | float(default=None) }}
    {% else %}
      None
    {% endif %}

  season: >
    {% if season_sensor not in [none, ''] %}
      {{ states(season_sensor) | lower }}
    {% else %}
      unknown
    {% endif %}

  solar_exporting: >
    {% if solar_export_sensor in [none, ''] or solar_boost_offset == 0 %}
      false
    {% else %}
      {% set v = states(solar_export_sensor) | float(default=0) %}
      {% if solar_positive_when_exporting %}
        {{ v >= solar_export_threshold }}
      {% else %}
        {{ (-v) >= solar_export_threshold }}
      {% endif %}
    {% endif %}

trigger:
  - platform: time_pattern
    minutes: "/1"
    id: tick
  - platform: state
    entity_id: !input enable_toggle
    id: toggle
  - platform: time
    at: !input schedule_start
    id: schedule_start
  - platform: time
    at: !input schedule_end
    id: schedule_end

condition: []

action:
  # ------------------------------------------------------------------
  # Fetch today's forecast once per tick (shared across all entities).
  # ------------------------------------------------------------------
  - if:
      - "{{ weather_entity not in [none, ''] }}"
    then:
      - service: weather.get_forecasts
        target:
          entity_id: "{{ weather_entity }}"
        data:
          type: daily
        response_variable: forecast_resp
  - variables:
      forecast_today: >
        {% if weather_entity not in [none, ''] and forecast_resp is defined %}
          {{ (forecast_resp[weather_entity].forecast | default([]))[0] | default(None) }}
        {% else %}
          None
        {% endif %}
      forecast_high: >
        {% if forecast_today is mapping %}
          {{ forecast_today.get('temperature') | float(default=None) }}
        {% else %}
          None
        {% endif %}
      forecast_low: >
        {% if forecast_today is mapping %}
          {{ forecast_today.get('templow') | float(default=None) }}
        {% else %}
          None
        {% endif %}
      forecast_hot_day: >
        {{ forecast_high is not none and forecast_high >= forecast_hot_threshold }}
      forecast_cold_night: >
        {{ forecast_low is not none and forecast_low <= forecast_cold_threshold }}

  # ------------------------------------------------------------------
  # Hard OFF cases — applied to all entities.
  # Order matters: disabled > out-of-schedule.
  # ------------------------------------------------------------------
  - choose:
      # Master toggle off → force off
      - conditions:
          - "{{ not enabled }}"
        sequence:
          - repeat:
              for_each: "{{ climate_entities }}"
              sequence:
                - if:
                    - "{{ not is_state(repeat.item, 'off') }}"
                  then:
                    - service: climate.turn_off
                      target:
                        entity_id: "{{ repeat.item }}"

      # Outside schedule → force off
      - conditions:
          - "{{ not in_schedule }}"
        sequence:
          - repeat:
              for_each: "{{ climate_entities }}"
              sequence:
                - if:
                    - "{{ not is_state(repeat.item, 'off') }}"
                  then:
                    - service: climate.turn_off
                      target:
                        entity_id: "{{ repeat.item }}"
                    - if:
                        - "{{ notify_service not in [none, ''] }}"
                      then:
                        - service: "{{ notify_service }}"
                          data:
                            message: >
                              Aircon: end of schedule — turned off {{ repeat.item }}.

    # ------------------------------------------------------------------
    # Default branch: enabled + in-schedule.
    # Per-entity decision: choose mode, compute effective target, decide
    # turn on / turn off / just adjust setpoint.
    # ------------------------------------------------------------------
    default:
      - repeat:
          for_each: "{{ climate_entities }}"
          sequence:
            - variables:
                ent: "{{ repeat.item }}"
                cur_temp: >
                  {% if room_temp_sensor not in [none, ''] %}
                    {{ states(room_temp_sensor) | float(default=None) }}
                  {% else %}
                    {{ state_attr(ent, 'current_temperature') | float(default=None) }}
                  {% endif %}
                hvac_mode: "{{ states(ent) }}"
                last_changed_min: >
                  {% set lc = states[ent].last_changed if states[ent] else None %}
                  {% if lc %}
                    {{ ((now() - lc).total_seconds() / 60) | round(1) }}
                  {% else %}
                    9999
                  {% endif %}
                # Decide desired direction (cool / heat) using the strategy.
                base_mode: >
                  {% set t = target_base %}
                  {% set decide_temp = outdoor_temp if outdoor_temp is not none else cur_temp %}
                  {% if mode_strategy == 'cool_only' %}
                    cool
                  {% elif mode_strategy == 'heat_only' %}
                    heat
                  {% elif mode_strategy == 'follow_climate' %}
                    {{ hvac_mode if hvac_mode in ['cool','heat','heat_cool','dry','fan_only'] else 'cool' }}
                  {% elif mode_strategy == 'auto_outdoor' and outdoor_temp is not none %}
                    {{ 'cool' if outdoor_temp >= t else 'heat' }}
                  {% elif mode_strategy == 'auto_season' %}
                    {% if season in ['winter'] %}
                      heat
                    {% elif season in ['summer'] %}
                      cool
                    {% elif season in ['autumn','fall'] %}
                      {# Heat by default; cool on very hot days OR forecast hot. #}
                      {% set hot_now = decide_temp is not none and decide_temp >= (t + season_hot_override) %}
                      {% if hot_now or forecast_hot_day %}
                        cool
                      {% else %}
                        heat
                      {% endif %}
                    {% elif season in ['spring'] %}
                      {# Cool by default; heat on very cold nights OR forecast cold. #}
                      {% set cold_now = decide_temp is not none and decide_temp <= (t - season_cold_override) %}
                      {% if cold_now or forecast_cold_night %}
                        heat
                      {% else %}
                        cool
                      {% endif %}
                    {% else %}
                      {# Unknown season \u2192 fall back to indoor-temp logic. #}
                      {% if cur_temp is none %}
                        cool
                      {% else %}
                        {{ 'cool' if cur_temp >= t else 'heat' }}
                      {% endif %}
                    {% endif %}
                  {% else %}
                    {% if cur_temp is none %}
                      cool
                    {% else %}
                      {{ 'cool' if cur_temp >= t else 'heat' }}
                    {% endif %}
                  {% endif %}
                # Humidity override: if cooling and the room is muggy, use `dry`.
                desired_mode: >
                  {% set bm = base_mode | trim %}
                  {% if bm == 'cool' and room_humidity is not none and room_humidity >= humidity_dry_threshold %}
                    dry
                  {% else %}
                    {{ bm }}
                  {% endif %}
                effective_target: >
                  {% set t = target_base %}
                  {% if solar_exporting %}
                    {% if desired_mode in ['cool','dry'] %}
                      {{ (t - solar_boost_offset) | round(1) }}
                    {% else %}
                      {{ (t + solar_boost_offset) | round(1) }}
                    {% endif %}
                  {% else %}
                    {{ t }}
                  {% endif %}
                should_be_on: >
                  {% if cur_temp is none %}
                    false
                  {% elif desired_mode in ['cool','dry'] %}
                    {{ cur_temp > (effective_target + hysteresis) }}
                  {% elif desired_mode == 'heat' %}
                    {{ cur_temp < (effective_target - hysteresis) }}
                  {% else %}
                    false
                  {% endif %}
                should_be_off: >
                  {% if cur_temp is none %}
                    false
                  {% elif desired_mode in ['cool','dry'] %}
                    {{ cur_temp < (effective_target - hysteresis) }}
                  {% elif desired_mode == 'heat' %}
                    {{ cur_temp > (effective_target + hysteresis) }}
                  {% else %}
                    false
                  {% endif %}
                is_on: "{{ hvac_mode != 'off' and hvac_mode != 'unavailable' }}"

            - choose:
                # Skipped if entity is unavailable / has no current_temperature.
                - conditions:
                    - "{{ cur_temp is none }}"
                  sequence: []

                # Currently OFF and should turn ON.
                - conditions:
                    - "{{ not is_on }}"
                    - "{{ should_be_on }}"
                  sequence:
                    - service: climate.set_hvac_mode
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        hvac_mode: "{{ desired_mode }}"
                    - service: climate.set_temperature
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        temperature: "{{ effective_target }}"
                    - if:
                        - "{{ notify_service not in [none, ''] }}"
                      then:
                        - service: "{{ notify_service }}"
                          data:
                            message: >
                              Aircon: {{ ent }} → {{ desired_mode }} @
                              {{ effective_target }}°C
                              (room {{ cur_temp }}°C, target {{ target_base }}°C
                              {% if solar_exporting %}, solar boost{% endif %}).

                # Currently ON and should turn OFF — respecting min runtime.
                - conditions:
                    - "{{ is_on }}"
                    - "{{ should_be_off }}"
                    - "{{ last_changed_min >= min_runtime_minutes }}"
                  sequence:
                    - service: climate.turn_off
                      target:
                        entity_id: "{{ ent }}"
                    - if:
                        - "{{ notify_service not in [none, ''] }}"
                      then:
                        - service: "{{ notify_service }}"
                          data:
                            message: >
                              Aircon: {{ ent }} reached target
                              ({{ cur_temp }}°C vs {{ effective_target }}°C) — off.

                # Currently ON, mode/setpoint may need updating (e.g. solar
                # boost just kicked in, or target_temp helper changed).
                - conditions:
                    - "{{ is_on }}"
                  sequence:
                    - if:
                        - "{{ mode_strategy != 'follow_climate' }}"
                        - "{{ hvac_mode != desired_mode }}"
                        - "{{ desired_mode in ['cool','heat','dry'] }}"
                      then:
                        - service: climate.set_hvac_mode
                          target:
                            entity_id: "{{ ent }}"
                          data:
                            hvac_mode: "{{ desired_mode }}"
                    - service: climate.set_temperature
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        temperature: "{{ effective_target }}"
